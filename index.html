<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema LC - Gestión de Deudas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo-group">
        <div class="logo-square">LC</div>
        <span class="logo-text">Estudio LC</span>
      </div>
      <nav class="nav">
        <a href="index.html" class="font-bold underline">🏠 Inicio</a>
        <a href="consulta.html">🔍 Consulta y Edición</a>
        <a href="carga.html">📥 Carga</a>
        <a href="fusion.html">🔀 Fusión</a>
        <a href="admin.html">⚙️ Admin</a>
      </nav>
    </div>
  </header>

  <main class="main">

    <div class="content-card">

    <div class="hero">
      <p class="hero-subtitle">Sistema de Gestión</p>
      <h1 class="hero-title">Deudas Municipales</h1>
      <p class="hero-desc">Municipalidad de Córdoba · Procuración</p>
    </div>

    <div class="total-card-wrapper">
      <div class="total-card">
        <span class="total-label">Total causas</span>
        <span class="total-number" id="totalNumber">—</span>
      </div>
    </div>

    <div class="estados-grid" id="estadosGrid">
      <!-- Cards de estado: se llenan dinámicamente -->
      <div class="estado-card-skeleton"></div>
      <div class="estado-card-skeleton"></div>
      <div class="estado-card-skeleton"></div>
      <div class="estado-card-skeleton"></div>
      <div class="estado-card-skeleton"></div>
    </div>

    <div class="btn-wrapper">
      <a href="consulta.html" class="btn-consultar">Consultar causas</a>
    </div>

    </div> <!-- /content-card -->

  </main>

  <script src="js/main.js"></script>
  <script>
    const ESTADOS_CONFIG = [
      { key: 'X', nombre: 'Extrajudicial', color: '#378ADD' },
      { key: 'D', nombre: 'Con Demanda',   color: '#BA7517' },
      { key: 'C', nombre: 'Con Convenio',  color: '#534AB7' },
      { key: 'P', nombre: 'Pagadas',       color: '#3B6D11' },
      { key: 'B', nombre: 'Baja',          color: '#888780' },
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      initSupabase();
      try {
        const { total, porEstado } = await contarPorEstado();

        document.getElementById('totalNumber').textContent =
          total.toLocaleString('es-AR');

        const grid = document.getElementById('estadosGrid');
        grid.innerHTML = ESTADOS_CONFIG.map(e => `
          <a href="consulta.html?filtro=${e.key}" class="estado-card" style="border-top-color: ${e.color}">
            <div class="estado-nombre">${e.nombre}</div>
            <div class="estado-numero">${(porEstado[e.key] || 0).toLocaleString('es-AR')}</div>
            <span class="estado-pill" style="background: ${e.color}">${e.key}</span>
          </a>
        `).join('');
      } catch (err) {
        console.error('Error al cargar datos:', err);
        document.getElementById('totalNumber').textContent = 'Error';
        document.getElementById('estadosGrid').innerHTML =
          '<p style="color:#c00;grid-column:1/-1;text-align:center">Error al cargar datos. Recargá la página.</p>';
      }
    });
  </script>

<footer style="background:#333;color:white;text-align:center;padding:20px;font-size:14px;margin-top:auto;">
  © 2025 Estudio LC - Sistema de Gestión de Deudas
</footer>

</body>
</html>
